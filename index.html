<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oil Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: Arial, sans-serif;
}

.container {
    display: flex;
    flex-direction: column;
    padding: 16px;
    width: 100%;
}

/* 170% zoom */
.widget {
    width: 100%;
    transform: scale(1.7);
    transform-origin: top left;
}

/* medzera medzi tickermi */
.spacer {
    height: 120px;
}
</style>

</head>
<body>

<div class="container">

<!-- BLACKBULL WTI -->
<div class="widget">
<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js" async>
{
    "symbol": "BLACKBULL:WTI",
    "width": "100%",
    "locale": "en",
    "colorTheme": "dark",
    "isTransparent": true
}
</script>
</div>

<div class="spacer"></div>

<!-- BLACKBULL BRENT -->
<div class="widget">
<script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-info.js" async>
{
    "symbol": "BLACKBULL:BRENT",
    "width": "100%",
    "locale": "en",
    "colorTheme": "dark",
    "isTransparent": true
}
</script>
</div>

</div>

</body>
</html>
